name: Discord host comments

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: discord-host-comments
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore comment poll state
        uses: actions/cache@v4
        with:
          path: .github/state/host-comments.json
          key: host-comments-state-v1
          restore-keys: host-comments-state-v1

      - name: Poll CurseForge and Wago comments
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_COMMENTS_CHANNEL_ID: ${{ secrets.DISCORD_COMMENTS_CHANNEL_ID }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          CF_MOD_ID: "1406501"
          WAGO_PROJECT_ID: "mKODQYGx"
        run: python .github/scripts/poll_host_comments.py
